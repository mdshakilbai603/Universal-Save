<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Save - Powerful Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #1e293b 0%, #080c14 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans">
    <div class="max-w-2xl w-full text-center">
        <h1 class="text-6xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Universal Save</h1>
        <p class="text-gray-400 mb-10 tracking-widest uppercase text-xs font-bold">The Most Powerful Video Downloader</p>
        <div class="glass p-2 rounded-2xl flex flex-col sm:flex-row shadow-2xl">
            <input id="urlInput" type="text" placeholder="ভিডিও লিঙ্কটি এখানে পেস্ট করুন..." class="flex-1 bg-transparent px-6 py-4 outline-none text-white text-lg">
            <button onclick="downloadVideo()" id="btn" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-xl font-black transition-all transform active:scale-95">ডাউনলোড</button>
        </div>
        <div id="loader" class="hidden mt-8 text-blue-400 animate-pulse font-mono">লিঙ্ক প্রসেস করা হচ্ছে...</div>
        <div id="result" class="hidden mt-12 glass p-6 rounded-3xl text-left shadow-2xl">
            <img id="vidThumb" src="" class="w-full h-56 object-cover rounded-2xl mb-5 border border-gray-700">
            <h2 id="vidTitle" class="text-xl font-bold mb-4 text-gray-100 line-clamp-2"></h2>
            <a id="dlLink" href="" target="_blank" class="block w-full text-center bg-gradient-to-r from-emerald-500 to-teal-600 text-black font-black py-4 rounded-xl shadow-xl uppercase">ফাইলটি সেভ করুন</a>
        </div>
    </div>
    <script>
        async function downloadVideo() {
            const url = document.getElementById('urlInput').value;
            const btn = document.getElementById('btn');
            const result = document.getElementById('result');
            const loader = document.getElementById('loader');
            if (!url) return alert('লিঙ্ক দিন!');
            loader.classList.remove('hidden');
            result.classList.add('hidden');
            btn.disabled = true;
            try {
                const res = await fetch('/fetch', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url })
                });
                const data = await res.json();
                if (data.download_url) {
                    document.getElementById('vidTitle').innerText = data.title;
                    document.getElementById('vidThumb').src = data.thumbnail;
                    document.getElementById('dlLink').href = data.download_url;
                    result.classList.remove('hidden');
                } else { alert(data.error); }
            } catch (e) { alert('সার্ভার এরর!'); }
            finally { loader.classList.add('hidden'); btn.disabled = false; }
        }
    </script>
</body>
</html>
