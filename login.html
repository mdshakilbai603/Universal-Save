<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Save - Authentication Required</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0e0e10;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #1c1c1e;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { font-size: 26px; margin-bottom: 10px; }
        p { color: #86868b; font-size: 15px; margin-bottom: 30px; line-height: 1.4; }
        .code-display {
            font-size: 32px;
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 2px;
            background: #2c2c2e;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
            border: 1px dashed #d4af37;
        }
        .btn {
            background: #0071e3;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover { background: #0077ed; }
        .loading { display: none; color: #86868b; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Universal Save</h2>
        <p>সার্ভার সচল করতে প্রথমে আপনার গুগল অ্যাকাউন্ট দিয়ে লগইন ভেরিফিকেশন সম্পন্ন করতে হবে। এটি মাত্র একবারের জন্য প্রয়োজন।</p>
        
        <button class="btn" id="loginBtn" onclick="startVerification()">Connect Google Account</button>
        
        <div class="code-display" id="codeBox">XXXX-XXXX</div>
        <div class="loading" id="statusText">গুগল থেকে সিকিউরিটি কোড আনা হচ্ছে...</div>
    </div>

    <script>
        async function startVerification() {
            const btn = document.getElementById('loginBtn');
            const codeBox = document.getElementById('codeBox');
            const statusText = document.getElementById('statusText');
            
            btn.style.display = 'none';
            statusText.style.display = 'block';
            statusText.innerText = "গুগল সিকিউরিটি কোড তৈরি করছে...";

            try {
                const res = await fetch('/api/start-login');
                const data = await res.json();
                
                if (data.success) {
                    // স্ক্রিনে কোডটি দেখানো
                    codeBox.innerText = data.google_code;
                    codeBox.style.display = 'block';
                    
                    statusText.innerHTML = `১. উপরের কোডটি মনে রাখুন বা কপি করুন।<br>২. নিচের লিংকে গিয়ে কোডটি বসিয়ে Allow করুন।<br><br><b style="color:#0071e3">অপেক্ষা করা হচ্ছে... লগইন শেষ হলে এই পেজটি অটোমেটিক রিফ্রেশ হবে।</b>`;
                    
                    // নতুন ট্যাবে গুগলের ডিভাইস ভেরিফিকেশন পেজ খুলে দেওয়া
                    window.open(data.redirect_url, '_blank');
                    
                    // ব্যাকএন্ডে প্রতি ৩ সেকেন্ড পর পর চেক করবে ইউজার জিমেইলে Allow চাপলো কি না
                    const interval = setInterval(async () => {
                        const checkRes = await fetch('/api/check-login-status');
                        const checkData = await checkRes.json();
                        if (checkData.logged_in) {
                            clearInterval(interval);
                            statusText.innerText = "লগইন সফল! আপনার সাইট চালু হচ্ছে...";
                            setTimeout(() => {
                                window.location.reload(); // পেজ রিফ্রেশ করে মেইন সাইটে নিয়ে যাবে
                            }, 1500);
                        }
                    }, 3000);

                } else {
                    alert("ভুল হয়েছে: " + data.error);
                    btn.style.display = 'block';
                    statusText.style.display = 'none';
                }
            } catch (e) {
                alert("সার্ভার কানেকশন এরর!");
                btn.style.display = 'block';
                statusText.style.display = 'none';
            }
        }
    </script>
</body>
</html>
